<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EstadioApp</title>
    <base href="/" />

    <!-- Bootstrap -->
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />

    <!-- MudBlazor CSS (NECESARIO) -->
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <!-- Blazor styles -->
    <link href="EstadioApp.styles.css" rel="stylesheet" />

    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- MudBlazor JS (NECESARIO) -->
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <!-- Blazor WebAssembly -->
    <script src="_framework/blazor.webassembly.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="/scripts/admin.js?v=20260409-4"></script>
    <script>
        window.playAlertSound = function () {
            const audio = new Audio("/sounds/beep1.mp3");
            audio.play().catch(err => {
                console.warn("No se pudo reproducir el sonido:", err);
            });
        };
    </script>
    
    <script>
        window.playMessageSound = function () {
            const audio = new Audio("/sounds/beep1.mp3");
            audio.play().catch(() => { });
        };
    </script>

</body>

</html>
